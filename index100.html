<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <title>Statistico Calculators Hub</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;

            font-family: "Segoe UI", Tahoma, sans-serif;
            color: #eff6ff;
        }

        .shell {
            width: 100%;
            height: 100%;

            border-bottom: 1px solid rgba(120, 200, 255, 0.24);

        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="notice">Statistico Calculators Hub</div>
        <iframe
            title="Statistico Calculators Hub"
            src="/Statistico-Website/index-Calculators.html"
            loading="eager"
            referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
    </div>
</body>
</html>
