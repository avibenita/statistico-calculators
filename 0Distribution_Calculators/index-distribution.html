<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribution Calculators</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg: #060f1d;
            --panel: #111f34;
            --panel-2: #0d1a2c;
            --border: rgba(120, 200, 255, 0.25);
            --text: #e7f0ff;
            --muted: #9ab1cc;
            --accent: #78c8ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 10% 0%, rgba(255, 165, 120, 0.16), transparent 35%), linear-gradient(180deg, #040c1a, var(--bg));
            color: var(--text);
            overflow: hidden;
        }

        .shell {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: 82px 1fr 34px;
        }

        .top-header {
            display: grid;
            grid-template-columns: 220px 1fr 180px;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            border-bottom: 1px solid rgba(120, 200, 255, 0.2);
            background: linear-gradient(90deg, #0a1730 0%, #0e1e39 58%, #14284a 100%);
        }

        .brand {
            color: #f1f7ff;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .brand i {
            color: #f2a277;
        }

        .header-title {
            justify-self: center;
            color: #ffac80;
            font-size: clamp(1.65rem, 2.2vw, 2.2rem);
            font-weight: 800;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 12px rgba(242, 162, 119, 0.16);
        }

        .header-title i {
            font-size: clamp(1.55rem, 2vw, 2rem);
        }

        .mode-chip {
            justify-self: end;
            border: 1px solid rgba(120, 200, 255, 0.34);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.75rem;
            color: #d8e9ff;
            background: rgba(120, 200, 255, 0.12);
        }

        .app {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 10px;
            padding: 10px;
        }

        .sidebar {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            padding: 12px;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 1.02rem;
            margin-bottom: 8px;
            color: #ffd8c1;
        }

        .sidebar p {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .dist-list {
            display: grid;
            gap: 16px;
        }

        details.dist-group {
            margin: 0;
            border: 1px solid rgba(120, 200, 255, 0.24);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(10, 24, 42, 0.7);
        }

        .dist-group summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px;
            font-size: 0.86rem;
            font-weight: 700;
            color: #eef5ff;
            border-bottom: 1px solid rgba(120, 200, 255, 0.18);
            background: linear-gradient(180deg, rgba(16, 37, 64, 0.95), rgba(10, 28, 50, 0.95));
        }

        .dist-group summary::-webkit-details-marker {
            display: none;
        }

        .summary-left {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .summary-left i {
            color: #f2a277;
        }

        .summary-caret {
            color: #f2a277;
            font-size: 0.76rem;
            transition: transform 0.2s ease;
        }

        .dist-group[open] .summary-caret {
            transform: rotate(90deg);
        }

        .dist-items {
            display: grid;
            gap: 1px;
            background: rgba(120, 200, 255, 0.1);
        }

        .dist-btn {
            display: block;
            width: 100%;
            text-align: left;
            border: 0;
            padding: 8px 10px;
            color: var(--text);
            background: rgba(9, 22, 38, 0.98);
            cursor: pointer;
            font-size: 0.84rem;
        }

        .dist-btn.active {
            border-color: rgba(120, 200, 255, 0.7);
            background: rgba(120, 200, 255, 0.2);
        }

        .workspace {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(16, 31, 51, 0.9), rgba(9, 21, 38, 0.95));
            box-shadow: 0 0 0 1px rgba(120, 200, 255, 0.1) inset, 0 0 26px rgba(120, 200, 255, 0.14);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .footer {
            display: grid;
            place-items: center;
            border-top: 1px solid rgba(120, 200, 255, 0.18);
            color: #9fb6d2;
            font-size: 0.76rem;
            background: rgba(7, 20, 34, 0.92);
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="top-header">
        <div class="brand"><i class="fa-solid fa-flask-vial"></i> Distribution Suite</div>
        <div class="header-title"><i class="fa-solid fa-chart-line"></i> Normal Distribution Calculator</div>
        <div class="mode-chip">Interactive Mode</div>
    </header>

    <div class="app">
        <aside class="sidebar">
            <h1>Distribution Calculators</h1>
            <p>Select a calculator to load it in the right panel.</p>
            <div class="dist-list">
                <details class="dist-group" open>
                    <summary>
                        <span class="summary-left"><i class="fa-solid fa-chart-line"></i> Continuous Distributions</span>
                        <i class="fa-solid fa-caret-right summary-caret"></i>
                    </summary>
                    <div class="dist-items">
                        <button class="dist-btn active" data-src="../statistical-distributions/Normal.html">Normal Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/UniformDistribution.html">Uniform Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/ExponentialDistribution.html">Exponential Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/LogNormalDistribution.html">Log-Normal Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/WeibullDistribution.html">Weibull Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/BetaDistribution.html">Beta Distribution</button>
                    </div>
                </details>

                <details class="dist-group">
                    <summary>
                        <span class="summary-left"><i class="fa-solid fa-cubes"></i> Discrete Distributions</span>
                        <i class="fa-solid fa-caret-right summary-caret"></i>
                    </summary>
                    <div class="dist-items">
                        <button class="dist-btn" data-src="../statistical-distributions/BinomialDistribution.html">Binomial Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/PoissonDistribution.html">Poisson Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/GeometricDistribution.html">Geometric Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/HypergeometricDistribution.html">Hypergeometric Distribution</button>
                    </div>
                </details>

                <details class="dist-group">
                    <summary>
                        <span class="summary-left"><i class="fa-solid fa-flask-vial"></i> H0 Testing Distributions</span>
                        <i class="fa-solid fa-caret-right summary-caret"></i>
                    </summary>
                    <div class="dist-items">
                        <button class="dist-btn" data-src="../statistical-distributions/ChiSquare.html">Chi-Square Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/FDistribution.html">F Distribution</button>
                        <button class="dist-btn" data-src="../statistical-distributions/TDistribution.html">t Distribution</button>
                    </div>
                </details>
            </div>
        </aside>

        <section class="workspace">
            <iframe id="distFrame" src="../statistical-distributions/Normal.html" title="Distribution calculator"></iframe>
        </section>
    </div>

    <footer class="footer">All rights reserved © Statistico</footer>
</div>

<script>
    (function () {
        var buttons = document.querySelectorAll(".dist-btn");
        var frame = document.getElementById("distFrame");
        var title = document.querySelector(".header-title");
        
        function hideEmbeddedHeader() {
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                if (!doc) return;
                if (!doc.getElementById("shellHideHeaderStyle")) {
                    var style = doc.createElement("style");
                    style.id = "shellHideHeaderStyle";
                    style.textContent = ".header { display: none !important; }";
                    doc.head.appendChild(style);
                }
            } catch (e) {
                // Ignore if cross-origin in future calculators.
            }
        }

        function applyNormalLayoutProfile() {
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                if (!doc) return;
                if (!doc.getElementById("shellNormalLayoutStyle")) {
                    var style = doc.createElement("style");
                    style.id = "shellNormalLayoutStyle";
                    style.textContent = [
                        "html, body { width: 100% !important; height: 100% !important; overflow: hidden !important; }",
                        "body { margin: 0 !important; }",
                        ".main-container, .content-wrapper, #mainContentWrapper, .container {",
                        "  width: 100% !important; max-width: none !important; height: 100% !important;",
                        "}",
                        ".container { margin: 0 !important; padding: 10px !important; border-radius: 12px !important; }",
                        ".main-content {",
                        "  display: grid !important;",
                        "  grid-template-columns: minmax(320px, 34%) 1fr !important;",
                        "  gap: 14px !important;",
                        "  align-items: start !important;",
                        "}",
                        ".control-panel, .controls-panel, .input-panel { width: 100% !important; max-width: none !important; }",
                        ".visualization-panel, .results-panel { width: 100% !important; max-width: none !important; min-height: 0 !important; }",
                        "@media (max-width: 1200px) {",
                        "  .main-content { grid-template-columns: minmax(300px, 34%) 1fr !important; }",
                        "}"
                    ].join("");
                    doc.head.appendChild(style);
                }

                var panels = doc.querySelectorAll("h3, h4, .panel-title");
                panels.forEach(function (el) {
                    var txt = (el.textContent || "").trim();
                    if (txt.indexOf("Input Panel") >= 0) {
                        el.textContent = "Inputs";
                    } else if (txt.indexOf("Results Panel - Visualizations & Statistics") >= 0) {
                        el.textContent = "Results";
                    }
                });
            } catch (e) {
                // Ignore cross-origin / transient errors.
            }
        }

        frame.addEventListener("load", function () {
            hideEmbeddedHeader();
            applyNormalLayoutProfile();
        });

        buttons.forEach(function (btn) {
            btn.addEventListener("click", function () {
                buttons.forEach(function (b) { b.classList.remove("active"); });
                btn.classList.add("active");
                frame.src = btn.getAttribute("data-src");
                var label = btn.textContent.trim();
                title.innerHTML = '<i class="fa-solid fa-chart-line"></i> ' + label + ' Calculator';
            });
        });

        hideEmbeddedHeader();
        applyNormalLayoutProfile();
    })();
</script>
</body>
</html>
