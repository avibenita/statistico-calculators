<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribution Calculators</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg: #060f1d;
            --panel: #111f34;
            --panel-2: #0d1a2c;
            --border: rgba(120, 200, 255, 0.25);
            --text: #e7f0ff;
            --muted: #9ab1cc;
            --accent: #78c8ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 10% 0%, rgba(255, 165, 120, 0.16), transparent 35%), linear-gradient(180deg, #040c1a, var(--bg));
            color: var(--text);
            overflow: hidden;
        }

        .shell {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: 82px 1fr 34px;
        }

        .top-header {
            display: grid;
            grid-template-columns: 220px 1fr 180px;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            border-bottom: 1px solid rgba(120, 200, 255, 0.2);
            background: linear-gradient(90deg, #0a1730 0%, #0e1e39 58%, #14284a 100%);
        }

        .brand {
            color: #f1f7ff;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .brand i {
            color: #f2a277;
        }

        .header-title {
            justify-self: center;
            color: #ffac80;
            font-size: clamp(1.65rem, 2.2vw, 2.2rem);
            font-weight: 800;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 12px rgba(242, 162, 119, 0.16);
        }

        .header-title i {
            font-size: clamp(1.55rem, 2vw, 2rem);
        }

        .mode-chip {
            justify-self: end;
            border: 1px solid rgba(120, 200, 255, 0.34);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.75rem;
            color: #d8e9ff;
            background: rgba(120, 200, 255, 0.12);
        }

        .app {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 10px;
            padding: 10px;
        }

        .sidebar {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            padding: 12px;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 1.02rem;
            margin-bottom: 8px;
            color: #ffd8c1;
        }

        .sidebar p {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .dist-list {
            display: grid;
            gap: 8px;
        }

        .dist-btn {
            display: block;
            width: 100%;
            text-align: left;
            border: 1px solid rgba(120, 200, 255, 0.24);
            border-radius: 10px;
            padding: 8px 10px;
            color: var(--text);
            background: rgba(120, 200, 255, 0.08);
            cursor: pointer;
            font-size: 0.84rem;
        }

        .dist-btn.active {
            border-color: rgba(120, 200, 255, 0.7);
            background: rgba(120, 200, 255, 0.2);
        }

        .workspace {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(16, 31, 51, 0.9), rgba(9, 21, 38, 0.95));
            box-shadow: 0 0 0 1px rgba(120, 200, 255, 0.1) inset, 0 0 26px rgba(120, 200, 255, 0.14);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .footer {
            display: grid;
            place-items: center;
            border-top: 1px solid rgba(120, 200, 255, 0.18);
            color: #9fb6d2;
            font-size: 0.76rem;
            background: rgba(7, 20, 34, 0.92);
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="top-header">
        <div class="brand"><i class="fa-solid fa-flask-vial"></i> Distribution Suite</div>
        <div class="header-title"><i class="fa-solid fa-chart-line"></i> Normal Distribution Calculator</div>
        <div class="mode-chip">Interactive Mode</div>
    </header>

    <div class="app">
        <aside class="sidebar">
            <h1>Distribution Calculators</h1>
            <p>Select a calculator to load it in the right panel.</p>
            <div class="dist-list">
                <button class="dist-btn active" data-src="../statistical-distributions/Normal.html">Normal</button>
                <button class="dist-btn" data-src="../statistical-distributions/TDistribution.html">t Distribution</button>
                <button class="dist-btn" data-src="../statistical-distributions/FDistribution.html">F Distribution</button>
                <button class="dist-btn" data-src="../statistical-distributions/ChiSquare.html">Chi-Square</button>
                <button class="dist-btn" data-src="../statistical-distributions/BinomialDistribution.html">Binomial</button>
                <button class="dist-btn" data-src="../statistical-distributions/PoissonDistribution.html">Poisson</button>
                <button class="dist-btn" data-src="../statistical-distributions/UniformDistribution.html">Uniform</button>
                <button class="dist-btn" data-src="../statistical-distributions/ExponentialDistribution.html">Exponential</button>
            </div>
        </aside>

        <section class="workspace">
            <iframe id="distFrame" src="../statistical-distributions/Normal.html" title="Distribution calculator"></iframe>
        </section>
    </div>

    <footer class="footer">All rights reserved © Statistico</footer>
</div>

<script>
    (function () {
        var buttons = document.querySelectorAll(".dist-btn");
        var frame = document.getElementById("distFrame");
        var title = document.querySelector(".header-title");
        
        function hideEmbeddedHeader() {
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                if (!doc) return;
                if (!doc.getElementById("shellHideHeaderStyle")) {
                    var style = doc.createElement("style");
                    style.id = "shellHideHeaderStyle";
                    style.textContent = ".header { display: none !important; }";
                    doc.head.appendChild(style);
                }
            } catch (e) {
                // Ignore if cross-origin in future calculators.
            }
        }

        frame.addEventListener("load", hideEmbeddedHeader);

        buttons.forEach(function (btn) {
            btn.addEventListener("click", function () {
                buttons.forEach(function (b) { b.classList.remove("active"); });
                btn.classList.add("active");
                frame.src = btn.getAttribute("data-src");
                title.innerHTML = '<i class="fa-solid fa-chart-line"></i> ' + btn.textContent + ' Distribution Calculator';
            });
        });

        hideEmbeddedHeader();
    })();
</script>
</body>
</html>
