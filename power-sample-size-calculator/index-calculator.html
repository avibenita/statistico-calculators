<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power and Sample Size Calculator</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #071422;
            color: #eff6ff;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .wrap {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .head {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(120, 200, 255, 0.24);
            background: rgba(120, 200, 255, 0.12);
            font-size: 0.9rem;
            color: #d7e7ff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #ffffff;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="head">Power and Sample Size Calculator</div>
    <iframe title="Power and Sample Size" src="../power-calculators/SampleSizeCalculator.html"></iframe>
</div>
</body>
</html>
